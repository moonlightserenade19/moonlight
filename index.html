<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Happy Birthday Surprise</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: url("heart-bg.jpg");
      background-size: cover;
      background-position: center;
      font-family: 'Fredoka', sans-serif;
      overflow: hidden;
    }

    /* முதல் பக்கம்: கடித உறை மட்டும் */
    #envelope-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    #envelope {
      width: 200px;
      animation: pulse 1.5s infinite;
    }

    /* இரண்டாம் & மூன்றாம் பக்கம்: லெட்டர் விண்டோ அமைப்பு */
    #letter-container {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      gap: 15px; /* பாக்ஸிற்கு வெளியே இருக்கும் டெக்ஸ்டுக்கும் பாக்ஸுக்கும் இடைவெளி */
    }

    /* பாக்ஸிற்கு மேலே வரும் மெயின் டெக்ஸ்ட் ஸ்டைல் */
    .top-title {
      font-size: 20px;
      font-weight: 700;
      color: #222222; /* தெளிவான கருப்பு நிறம் */
      text-align: center;
      max-width: 85%;
      margin: 0;
      line-height: 1.4;
      text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
    }

    /* அந்த பிங்க் கலர் பாக்ஸ் (வெறும் பூனை மற்றும் பட்டன்களுக்கு மட்டும்) */
    .letter-window {
      width: 90vw;
      max-width: 450px;
      aspect-ratio: 3/2;
      display: flex;
      flex-direction: column;
      justify-content: center; 
      align-items: center;
      background-image: url("window.png");
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      position: relative;
      transform: scale(1.2);
      opacity: 0;
      transition: transform 0.6s ease, opacity 0.6s ease;
    }

    .letter-window.open {
      transform: scale(1);
      opacity: 1;
    }

    /* பூனைக்குட்டி இருக்கும் இடம் (பாக்ஸிற்குள் சரியாக உட்கார) */
    #cat-img-container {
      margin-top: 25px;
    }

    .cat {
      width: 105px; 
      height: auto;
    }

    /* பட்டன்கள் */
    .buttons {
      display: flex;
      justify-content: center;
      position: relative;
      width: 100%;
      height: 40px;
      margin-top: 10px;
    }

    .btn {
      width: 90px;
      height: auto;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }

    .yes-btn {
      position: absolute;
      left: calc(50% - 100px);
      z-index: 5;
    }

    .no-btn {
      position: absolute;
      left: calc(50% + 10px);
      z-index: 4;
      touch-action: none;
    }

    /* பாக்ஸிற்கு கீழே வரும் 'Gardener' டெக்ஸ்ட் ஸ்டைல் */
    .bottom-title {
      font-size: 18px;
      font-weight: 700;
      color: #222222;
      text-align: center;
      margin: 0;
      display: none; /* ஆரம்பத்தில் மறந்திருக்கும் */
      text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
    }
  </style>
</head>
<body>

  <div id="envelope-container">
    <img id="envelope" src="envelope.png" alt="Envelope">
  </div>

  <div id="letter-container">
    <h1 id="letter-title" class="top-title">I feel like you’re getting tired of making me blush already… so you’re gonna stop soon, right?</h1>
    
    <div class="letter-window">
      <div id="cat-img-container">
        <img id="letter-cat" src="cat_heart.gif" alt="Cat" class="cat">
      </div>

      <div class="buttons" id="letter-buttons">
        <img src="yes.png" alt="Yes" class="btn yes-btn" id="yes-btn">
        <img src="no.png" alt="No" class="btn no-btn
